<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Cover Studio | By Junaid</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #ff0000; /* টেমপ্লেটের লাল কালার */
            --bg-color: #f4f4f9;
            --form-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            margin: 0;
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            max-width: 1300px;
            width: 100%;
            background-color: var(--form-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Input Card Styling */
        .input-panel h1 {
            font-size: 28px;
            margin-bottom: 25px;
            color: var(--primary-color);
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 12px;
            color: var(--text-color);
            font-size: 15px;
            transition: 0.4s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            background: #ffffff;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        input:focus + i { color: var(--primary-color); }

        /* Custom File Input */
        .file-upload {
            position: relative;
            background: rgba(255, 0, 0, 0.05);
            border: 2px dashed var(--primary-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-upload:hover { background: rgba(255, 0, 0, 0.1); }
        .file-upload input { position: absolute; opacity: 0; cursor: pointer; top: 0; left: 0; height: 100%; }

        /* Preview Panel */
        .preview-panel { text-align: center; }
        
        canvas {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            background-color: #eee;
        }

        .action-btns {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-dl { background: var(--primary-color); color: white; }
        .btn-dl:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3); }

        .btn-reset { background: rgba(0,0,0,0.1); color: var(--text-color); }

        .footer-credit {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #666;
            width: 100%;
            display: block;
        }

        .footer-credit a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="input-panel">
        <h1><i class="fas fa-magic"></i> Cover Studio</h1>
        
        <div class="input-box">
            <input type="text" id="userName" placeholder="আপনার নাম লিখুন..." oninput="drawCover()">
            <i class="fas fa-user"></i>
        </div>

        <div class="input-group" style="display: flex; gap: 10px;">
            <div class="input-box" style="flex: 1;">
                <input type="email" id="userEmail" placeholder="জিমেইল..." oninput="drawCover()">
                <i class="fas fa-envelope"></i>
            </div>
            <div class="input-box" style="flex: 1;">
                <input type="text" id="userPhone" placeholder="ফোন নম্বর..." oninput="drawCover()">
                <i class="fas fa-phone"></i>
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="userAddress" placeholder="আপনার ঠিকানা..." oninput="drawCover()">
            <i class="fas fa-map-marker-alt"></i>
        </div>

        <div class="file-upload">
            <i class="fas fa-cloud-upload-alt" style="font-size: 30px; color: var(--primary-color);"></i>
            <p style="margin: 10px 0 0 0; font-weight: 500;">এখানে ছবি আপলোড করুন</p>
            <input type="file" id="userImage" accept="image/*" onchange="drawCover()">
        </div>

        <div class="action-btns" style="margin-top: 25px;">
            <button class="btn btn-dl" id="download-btn"><i class="fas fa-download"></i> ডাউনলোড</button>
            <button class="btn btn-reset" onclick="location.reload()"><i class="fas fa-sync-alt"></i> রিসেট</button>
        </div>
    </div>

    <div class="preview-panel">
        <canvas id="coverCanvas" width="1024" height="400"></canvas>
        <p style="opacity: 0.6; font-size: 13px;"><i class="fas fa-info-circle"></i> লাইভ প্রিভিউ এখানে দেখা যাবে</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('coverCanvas');
    const ctx = canvas.getContext('2d');
    const templateImg = new Image();
    
    // টেমপ্লেট ইমেজের নাম 'template.png' হতে হবে এবং একই ফোল্ডারে থাকতে হবে
    templateImg.src = 'template.png'; 

    templateImg.onload = () => drawCover();

    function drawCover() {
        // তথ্যগুলি পূরণ না করলে ডিফল্ট মান দেখাবে
        const name = document.getElementById('userName').value || "MD JUNAID KHAN";
        const email = document.getElementById('userEmail').value || "example@gmail.com";
        const phone = document.getElementById('userPhone').value || "+880 12345678";
        const address = document.getElementById('userAddress').value || "Khulna, Bangladesh";
        const imageInput = document.getElementById('userImage');

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // প্রথমে টেমপ্লেট ইমেজ ড্র করা
        ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);

        // টেক্সট ড্রয়িং এবং পজিশনিং (টেমপ্লেট অনুযায়ী নিখুঁতভাবে সংশোধন করা)
        ctx.textAlign = "left";
        
        // নাম (কালো কালার, Bold, এবং সঠিক পজিশন)
        ctx.fillStyle = "#000000";
        ctx.font = "bold 44px 'Hind Siliguri'";
        // টেমপ্লেট অনুযায়ী পজিশন: x= ৫৮, y= ১৮১
        ctx.fillText(name.toUpperCase(), 58, 181);

        // ছোট তথ্যগুলো (ইমেইল, ফোন, ঠিকানা)
        ctx.font = "500 21px 'Hind Siliguri'";
        ctx.fillStyle = "#000000"; // কালো কালার
        
        // টেমপ্লেট অনুযায়ী নিখুঁত পজিশনিং
        // আইকনের সাথে অ্যালাইন করতে x= ১০৪ ব্যবহার করা হয়েছে
        ctx.fillText(email, 104, 282); // জিমেইল y= ২৮২
        ctx.fillText(phone, 104, 342); // ফোন y= ৩৪২
        ctx.fillText(address, 104, 402); // ঠিকানা y= ৪০২

        // ৩. ছবি হ্যান্ডলিং এবং পজিশনিং
        if (imageInput.files && imageInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    ctx.save();
                    // বৃত্তাকার সাদা ফ্রেমের সঠিক কেন্দ্র এবং আকার (টেমপ্লেট অনুযায়ী নিখুঁতভাবে ক্যালিব্রেট করা)
                    // ১০২৪x৪০০ পিক্সেল ইমেজে বৃত্তের কেন্দ্র প্রায় x= ৭৯০, y= ২১৩
                    const centerX = 790; 
                    const centerY = 213;
                    const radius = 145; // বৃত্তের ব্যাসার্ধ ১৪৫ পিক্সেল

                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.clip(); // বৃত্তাকার মাস্কিং চালু করা

                    // ছবিটি ড্র করা (AspectRatio ঠিক রেখে এবং বৃত্তের পুরো জায়গা জুড়ে নিখুঁতভাবে বসানো)
                    // ছবিটিকে সঠিক কেন্দ্রে বসাতে centerX - radius এবং centerY - radius ব্যবহার করা হয়েছে
                    ctx.drawImage(img, centerX - radius, centerY - radius, radius * 2, radius * 2);
                    ctx.restore(); // মাস্কিং বন্ধ করা
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(imageInput.files[0]);
        }
    }

    // ডাউনলোড বাটন লজিক
    document.getElementById('download-btn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'Cover-Studio-By-Junaid.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

    // ক্রেডিট সেকশন যোগ করা এবং ব্যবহারকারীর ফেসবুক প্রোফাইলে লিঙ্ক করা
    const credit = document.createElement('div');
    credit.classList.add('footer-credit');
    // 'YOUR_FACEBOOK_PROFILE_LINK' এর জায়গায় তোমার ফেসবুক প্রোফাইলের লিঙ্ক বসাও
    credit.innerHTML = 'Developed with ❤️ by <a href="https://www.facebook.com/Junaid.Khan.097" target="_blank">Junaid Khan</a>';
    document.querySelector('.app-container').after(credit);
</script>

</body>
</html>
