<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Studio | By Junaid</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #c30010;
            --secondary: #1877F2;
            --bg: #f0f2f5;
            --white: #ffffff;
            --success: #28a745;
        }

        body {
            margin: 0;
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: 0.5s;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), #800000);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 { margin: 0; font-size: 20px; letter-spacing: 1px; }

        .main-content { padding: 30px; }

        /* ভিউ কন্ট্রোল */
        #resultView { display: none; text-align: center; }

        .form-section h3 { 
            margin-top: 0; color: var(--primary); 
            border-left: 4px solid var(--primary); 
            padding-left: 12px; font-size: 18px; margin-bottom: 25px;
        }
        
        .input-group { margin-bottom: 18px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 43px; color: #888; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #444; font-size: 14px; }
        
        input {
            width: 100%; padding: 12px 15px 12px 42px;
            border: 1.5px solid #ddd; border-radius: 10px;
            font-size: 14px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 8px rgba(195,0,16,0.1); }

        .file-upload {
            border: 2px dashed var(--primary); border-radius: 12px;
            padding: 20px; text-align: center; background: #fff5f5;
            cursor: pointer; position: relative; margin: 20px 0; transition: 0.3s;
        }
        .file-upload.uploaded { border-color: var(--success); background: #f0fff4; }
        .file-upload input { position: absolute; opacity: 0; width: 100%; height: 100%; top: 0; left: 0; cursor: pointer; }
        .file-upload i { font-size: 28px; color: var(--primary); display: block; margin-bottom: 8px; }
        .file-upload.uploaded i { color: var(--success); }
        .file-upload b { color: #555; font-size: 14px; }
        .file-upload.uploaded b { color: var(--success); }

        /* বাটন স্টাইল */
        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; gap: 10px; 
            transition: 0.3s; font-size: 16px; margin-bottom: 10px;
        }
        
        .btn-generate { background: var(--primary); color: white; }
        .btn-generate:hover { background: #a0000d; transform: translateY(-2px); }
        
        .btn-download { background: var(--success); color: white; }
        .btn-download:hover { background: #218838; }

        .btn-back { background: #6c757d; color: white; margin-top: 10px; }

        /* রেজাল্ট ইমেজ */
        #previewImage { width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }

        .dev-footer { padding: 25px; text-align: center; background: #f8f9fa; border-top: 1px solid #eee; }
        .dev-button {
            display: inline-flex; align-items: center; gap: 10px;
            background: linear-gradient(45deg, #1877F2, #0056b3);
            color: white; padding: 12px 30px; text-decoration: none;
            font-size: 18px; font-weight: 700; border-radius: 50px;
            box-shadow: 0 8px 15px rgba(24, 119, 242, 0.2); transition: 0.3s;
        }
        .dev-button:hover { transform: scale(1.05); }

        #coverCanvas { display: none; }

        @media (max-width: 480px) {
            .container { border-radius: 0; min-height: 100vh; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1><i class="fas fa-magic"></i> Cover Studio</h1>
    </div>

    <div class="main-content" id="formView">
        <div class="form-section">
            <h3>আপনার তথ্য দিন</h3>
            
            <div class="input-group">
                <label>আপনার নাম</label>
                <i class="fas fa-user"></i>
                <input type="text" id="userName" placeholder="যেমন: MD JUNAID KHAN">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>জিমেইল</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="userEmail" placeholder="example@gmail.com">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>ফোন নম্বর</label>
                    <i class="fas fa-phone"></i>
                    <input type="text" id="userPhone" placeholder="017XXXXXXXX">
                </div>
            </div>

            <div class="input-group">
                <label>ঠিকানা</label>
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" id="userAddress" placeholder="Paickgacha, Khulna">
            </div>

            <div class="file-upload" id="uploadBox">
                <i class="fas fa-cloud-upload-alt" id="uploadIcon"></i>
                <b id="statusText">ছবি নির্বাচন করুন</b>
                <input type="file" id="userImage" accept="image/*" onchange="handleImageSelection(this)">
            </div>
            
            <button class="btn btn-generate" id="generate-btn">
                <i class="fas fa-cog fa-spin" id="loadingIcon" style="display:none;"></i> 
                কভার তৈরি করুন
            </button>
        </div>
    </div>

    <div class="main-content" id="resultView">
        <h3 style="color: var(--success); margin-bottom: 20px;">আপনার কভার তৈরি হয়েছে!</h3>
        <img id="previewImage" src="" alt="Cover Preview">
        
        <button class="btn btn-download" id="download-link">
            <i class="fas fa-download"></i> গ্যালারিতে সেভ করুন
        </button>
        
        <button class="btn btn-back" onclick="backToForm()">
            <i class="fas fa-edit"></i> তথ্য সংশোধন করুন
        </button>
    </div>

    <div class="dev-footer">
        <a href="https://www.facebook.com/Junaid.Khan.097" target="_blank" class="dev-button">
            <i class="fab fa-facebook"></i> DEVELOPER JUNAID
        </a>
    </div>
</div>

<canvas id="coverCanvas" width="1200" height="444"></canvas>

<script>
    const canvas = document.getElementById('coverCanvas');
    const ctx = canvas.getContext('2d');
    const templateImg = new Image();
    templateImg.src = 'template.png'; 

    function handleImageSelection(input) {
        const statusText = document.getElementById('statusText');
        const uploadBox = document.getElementById('uploadBox');
        if (input.files && input.files[0]) {
            statusText.innerHTML = "ছবি যুক্ত হয়েছে: " + input.files[0].name.substring(0, 15) + "...";
            uploadBox.classList.add('uploaded');
        }
    }

    document.getElementById('generate-btn').addEventListener('click', function() {
        // লোডিং এনিমেশন
        document.getElementById('loadingIcon').style.display = "inline-block";
        
        const name = document.getElementById('userName').value || "MD JUNAID KHAN";
        const email = document.getElementById('userEmail').value || "example@gmail.com";
        const phone = document.getElementById('userPhone').value || "017XXXXXXXX";
        const address = document.getElementById('userAddress').value || "Paickgacha, Khulna";
        const imageInput = document.getElementById('userImage');

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#222222";
        ctx.textAlign = "left";
        ctx.font = "bold 45px 'Hind Siliguri'";
        ctx.fillText(name.toUpperCase(), 60, 195);

        ctx.font = "600 22px 'Hind Siliguri'";
        ctx.fillStyle = "#444444";
        ctx.fillText(email, 105, 285);
        ctx.fillText(phone, 105, 345);
        ctx.fillText(address, 105, 405);

        if (imageInput.files && imageInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    ctx.save();
                    const centerX = 910; const centerY = 221; const radius = 175;
                    ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, Math.PI * 2); ctx.clip();
                    
                    const imgAspect = img.width / img.height;
                    let sw, sh, sx, sy;
                    if (imgAspect > 1) {
                        sh = img.height; sw = sh; sx = (img.width - sw) / 2; sy = 0;
                    } else {
                        sw = img.width; sh = sw; sx = 0; sy = (img.height - sh) / 2;
                    }
                    ctx.drawImage(img, sx, sy, sw, sh, centerX - radius, centerY - radius, radius * 2, radius * 2);
                    ctx.restore();
                    showResult();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(imageInput.files[0]);
        } else {
            showResult();
        }
    });

    function showResult() {
        const dataURL = canvas.toDataURL('image/png');
        document.getElementById('previewImage').src = dataURL;
        
        // ভিউ পরিবর্তন
        document.getElementById('formView').style.display = "none";
        document.getElementById('resultView').style.display = "block";
        document.getElementById('loadingIcon').style.display = "none";
        
        // স্ক্রল করে উপরে নিয়ে আসা
        window.scrollTo(0, 0);
    }

    function backToForm() {
        document.getElementById('formView').style.display = "block";
        document.getElementById('resultView').style.display = "none";
    }

    // ডাউনলোড বাটন লজিক
    document.getElementById('download-link').addEventListener('click', function() {
        const link = document.createElement('a');
        link.download = 'Cover_By_Junaid.png';
        link.href = document.getElementById('previewImage').src;
        link.click();
    });
</script>

</body>
</html>
