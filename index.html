<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Cover Studio | By Junaid</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff0000;
            --secondary: #1877F2;
            --bg: #f0f2f5;
            --white: #ffffff;
            --text: #1c1e21;
        }

        body {
            margin: 0;
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px; /* ফর্মটি মাঝখানে রাখার জন্য উইডথ কমানো হয়েছে */
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), #d90429);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }

        .main-content {
            padding: 30px;
        }

        .form-section h3 { margin-top: 0; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 10px; font-size: 18px; }
        
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 42px; color: #888; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 14px; }
        
        input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 8px rgba(255,0,0,0.1); }

        .file-upload {
            border: 2px dashed var(--primary);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            background: #fff5f5;
            cursor: pointer;
            position: relative;
            margin: 15px 0;
        }
        .file-upload input { position: absolute; opacity: 0; width: 100%; height: 100%; top: 0; left: 0; cursor: pointer; }
        .file-upload i { font-size: 24px; color: var(--primary); display: block; margin-bottom: 5px; }

        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; font-size: 16px; }
        
        .btn-download { background: var(--primary); color: white; }
        .btn-download:hover { background: #b9041e; transform: translateY(-2px); }
        
        .btn-reset { background: #6c757d; color: white; }
        .btn-reset:hover { background: #5a6268; }

        .dev-footer { padding: 25px; text-align: center; background: #f8f9fa; border-top: 1px solid #eee; }
        .dev-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(45deg, #1877F2, #0056b3);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 8px 15px rgba(24, 119, 242, 0.2);
            transition: 0.3s;
            text-transform: uppercase;
        }
        .dev-button:hover { transform: scale(1.03); background: #1877F2; }

        /* ক্যানভাস হাইড করে রাখা হয়েছে */
        #coverCanvas { display: none; }

        @media (max-width: 480px) {
            .container { border-radius: 0; height: 100vh; max-width: 100%; }
            .action-btns { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-camera-retro"></i> Facebook Cover Generator</h1>
    </div>

    <div class="main-content">
        <div class="form-section">
            <h3>আপনার তথ্য দিন</h3>
            
            <div class="input-group">
                <label>আপনার নাম</label>
                <i class="fas fa-user"></i>
                <input type="text" id="userName" placeholder="যেমন: MD JUNAID KHAN" autocomplete="off">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>জিমেইল</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="userEmail" placeholder="example@gmail.com">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>ফোন নম্বর</label>
                    <i class="fas fa-phone"></i>
                    <input type="text" id="userPhone" placeholder="017XXXXXXXX">
                </div>
            </div>

            <div class="input-group">
                <label>ঠিকানা</label>
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" id="userAddress" placeholder="Paickgacha, Khulna" autocomplete="off">
            </div>

            <div class="file-upload">
                <i class="fas fa-cloud-upload-alt"></i>
                <b>ছবি নির্বাচন করুন</b>
                <input type="file" id="userImage" accept="image/*">
            </div>
            
            <div class="action-btns">
                <button class="btn btn-download" id="download-btn">
                    <i class="fas fa-download"></i> ডাউনলোড করুন
                </button>
                <button class="btn btn-reset" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i> রিসেট
                </button>
            </div>
        </div>
    </div>

    <div class="dev-footer">
        <a href="https://www.facebook.com/Junaid.Khan.097" target="_blank" class="dev-button">
            <i class="fab fa-facebook"></i> DEVELOPER JUNAID
        </a>
    </div>
</div>

<canvas id="coverCanvas" width="1200" height="444"></canvas>

<script>
    const canvas = document.getElementById('coverCanvas');
    const ctx = canvas.getContext('2d');
    const templateImg = new Image();
    templateImg.src = 'template.png'; 

    // ডাউনলোড বাটনে ক্লিক করলে ছবি তৈরি হবে এবং ডাউনলোড হবে
    document.getElementById('download-btn').addEventListener('click', function() {
        const name = document.getElementById('userName').value || "MD JUNAID KHAN";
        const email = document.getElementById('userEmail').value || "example@gmail.com";
        const phone = document.getElementById('userPhone').value || "017XXXXXXXX";
        const address = document.getElementById('userAddress').value || "Paickgacha, Khulna";
        const imageInput = document.getElementById('userImage');

        // ক্যানভাসে ড্র করা শুরু
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#222222";
        ctx.textAlign = "left";
        ctx.font = "bold 45px 'Hind Siliguri'";
        ctx.fillText(name.toUpperCase(), 60, 195);

        ctx.font = "600 22px 'Hind Siliguri'";
        ctx.fillStyle = "#444444";
        ctx.fillText(email, 105, 285);
        ctx.fillText(phone, 105, 345);
        ctx.fillText(address, 105, 405);

        if (imageInput.files && imageInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    ctx.save();
                    const centerX = 910; 
                    const centerY = 221;
                    const radius = 175;

                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.clip();

                    const imgAspect = img.width / img.height;
                    const targetAspect = 1;
                    let sw, sh, sx, sy;

                    if (imgAspect > targetAspect) {
                        sh = img.height;
                        sw = sh * targetAspect;
                        sx = (img.width - sw) / 2;
                        sy = 0;
                    } else {
                        sw = img.width;
                        sh = sw / targetAspect;
                        sx = 0;
                        sy = (img.height - sh) / 2;
                    }

                    ctx.drawImage(img, sx, sy, sw, sh, centerX - radius, centerY - radius, radius * 2, radius * 2);
                    ctx.restore();

                    // ড্রয়িং শেষ হলে ডাউনলোড ট্রিগার হবে
                    triggerDownload();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(imageInput.files[0]);
        } else {
            // যদি ছবি সিলেক্ট না করা থাকে তবে ডিফল্ট ডাউনলোড
            triggerDownload();
        }
    });

    function triggerDownload() {
        const link = document.createElement('a');
        link.download = 'Facebook_Cover_By_Junaid.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
