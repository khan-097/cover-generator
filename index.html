<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Cover Generator | Junaid</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e63946;
            --secondary-color: #1d3557;
            --bg-color: #f1faee;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        /* Form Styling */
        .form-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 320px;
        }

        .form-card h2 {
            margin-top: 0;
            color: var(--secondary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            font-size: 24px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(230, 57, 70, 0.2);
        }

        /* Preview Styling */
        .preview-card {
            flex: 1.5;
            min-width: 350px;
            text-align: center;
        }

        canvas {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: #eee;
        }

        .btn-container {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-download { background-color: var(--primary-color); color: white; }
        .btn-download:hover { background-color: #c1121f; transform: translateY(-2px); }

        .btn-reset { background-color: #6c757d; color: white; }
        .btn-reset:hover { background-color: #5a6268; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="form-card">
        <h2>আপনার তথ্য দিন</h2>
        
        <div class="input-group">
            <label>সম্পূর্ণ নাম:</label>
            <input type="text" id="userName" placeholder="যেমন: MD JUNAID KHAN" oninput="drawCover()">
        </div>

        <div class="input-group">
            <label>জিমেইল:</label>
            <input type="email" id="userEmail" placeholder="example@gmail.com" oninput="drawCover()">
        </div>

        <div class="input-group">
            <label>ফোন নম্বর:</label>
            <input type="text" id="userPhone" placeholder="+880 1XXX XXXXXX" oninput="drawCover()">
        </div>

        <div class="input-group">
            <label>ঠিকানা:</label>
            <input type="text" id="userAddress" placeholder="যেমন: Khulna, Bangladesh" oninput="drawCover()">
        </div>

        <div class="input-group">
            <label>আপনার ছবি (বর্গাকার হলে ভালো হয়):</label>
            <input type="file" id="userImage" accept="image/*" onchange="drawCover()">
        </div>

        <div class="btn-container">
            <button class="btn btn-download" id="download-btn">ডাউনলোড করুন</button>
            <button class="btn btn-reset" onclick="location.reload()">রিসেট</button>
        </div>
    </div>

    <div class="preview-card">
        <h2 style="color: #1d3557;">লাইভ প্রিভিউ</h2>
        <canvas id="coverCanvas" width="1200" height="444"></canvas>
        <p style="color: #666; margin-top: 10px; font-size: 14px;">* সঠিকভাবে দেখতে সব তথ্য পূরণ করুন</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('coverCanvas');
    const ctx = canvas.getContext('2d');
    const templateImg = new Image();
    
    // টেমপ্লেট ইমেজের নাম 'template.png' হতে হবে
    templateImg.src = 'template.png'; 

    templateImg.onload = () => {
        drawCover(); // শুরুতে টেমপ্লেটটি লোড হবে
    };

    function drawCover() {
        const name = document.getElementById('userName').value || "YOUR NAME HERE";
        const email = document.getElementById('userEmail').value || "example@gmail.com";
        const phone = document.getElementById('userPhone').value || "+880 1XXX XXXXXX";
        const address = document.getElementById('userAddress').value || "Your Address, Bangladesh";
        const imageInput = document.getElementById('userImage');

        // ১. টেমপ্লেট ড্র করা
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);

        // ২. টেক্সট সেটিংস
        ctx.fillStyle = "#333333";
        ctx.textAlign = "left";

        // নাম (Bold & Large)
        ctx.font = "bold 42px 'Hind Siliguri', 'Poppins'";
        ctx.fillText(name.toUpperCase(), 60, 205);

        // ছোট তথ্যগুলো (ইমেইল, ফোন, ঠিকানা)
        ctx.font = "500 22px 'Hind Siliguri', 'Poppins'";
        ctx.fillStyle = "#444444";
        ctx.fillText(email, 110, 288);
        ctx.fillText(phone, 110, 348);
        ctx.fillText(address, 110, 408);

        // ৩. ছবি হ্যান্ডলিং
        if (imageInput.files && imageInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    ctx.save();
                    // বৃত্তের পজিশন ও সাইজ (আপনার টেমপ্লেট অনুযায়ী এটি অ্যাডজাস্ট করতে হতে পারে)
                    const centerX = 915; 
                    const centerY = 222;
                    const radius = 175;

                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.clip();

                    // ছবিটি ড্র করা (AspectRatio ঠিক রেখে)
                    ctx.drawImage(img, centerX - radius, centerY - radius, radius * 2, radius * 2);
                    ctx.restore();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(imageInput.files[0]);
        }
    }

    // ডাউনলোড বাটন লজিক
    document.getElementById('download-btn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'Official-Cover-By-Junaid.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
